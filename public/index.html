		<title>Bobby's Triple Threat - Stats</title>

	<div class="statContainer" id="stat-winLossRecord">
		<div class="teamStatContainer">

		<div class="individualStatContainer">
			<h3 class="individualStatTitle">Titan Ranking</h3>

					<th>Titan</th>

				<tr class="individualStatTableRow">
					<td class="individualStatRank">1st</td>
					<td class="individualStatName">Michael Voltaggio</td>
					<td class="individualStatValue">10-2-3</td>
				</tr>
				<tr class="individualStatTableRow">
					<td class="individualStatRank">T-2nd</td>
					<td class="individualStatName">Brooke Williamson</td>
					<td class="individualStatValue">9-4-1</td>
				</tr>
				<tr class="individualStatTableRow">
					<td class="individualStatRank">3rd</td>
					<td class="individualStatName">Tiffany Derry</td>
					<td class="individualStatValue">9-4-1</td>
				</tr>
