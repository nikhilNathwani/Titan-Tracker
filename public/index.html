<!DOCTYPE html>
<html lang="en">
	<head>
		<meta charset="UTF-8" />
		<meta http-equiv="X-UA-Compatible" content="IE=edge" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<link rel="stylesheet" href="/style.css" />
		<!-- <link rel="preconnect" href="https://fonts.googleapis.com" />
		<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
		<link
			href="https://fonts.googleapis.com/css2?family=Paytone+One&display=swap"
			rel="stylesheet"
		/> -->
		<title>Bobby's Triple Threat - Stats</title>
	</head>
	<div class="page" id="titlePage">
		<div class="container titleContainer">
			<h1>Titan Tracker</h1>
		</div>
		<div class="container subContainer">
			Stats for <span id="showTitle">Bobby's Triple Threat</span> on Food
			Network
		</div>
	</div>
	<div class="page" id="winLoss">
		<h2 class="statTitle">Win-Loss Record</h2>
		<div class="container statContainer">
			<div id="winLossWidget">
				<div>
					<p class="winLossWidgetTitle">Wins</p>
					<p class="winLossWidgetValue" id="numWin"></p>
				</div>
				<div>
					<p class="winLossWidgetTitle">Losses</p>
					<p class="winLossWidgetValue" id="numLoss"></p>
				</div>
			</div>
			<div id="winLossCaption" class="statCaption"></div>
		</div>
	</div>
	<div class="page" id="titanRanking">
		<h2 class="statTitle">Titan Ranking</h2>
		<div class="container statContainer">
			<table class="statTable">
				<tr class="statTableHeader">
					<th>Rank</th>
					<th>Titan</th>
					<th>Win-Loss-Tie</th>
				</tr>
				<tr class="statTableRow">
					<td>
						<div class="rank"></div>
					</td>
					<td><div class="statTitan"></div></td>
					<td class="statValue"></td>
				</tr>
				<tr class="statTableRow">
					<td>
						<div class="rank"></div>
					</td>
					<td><div class="statTitan"></div></td>
					<td class="statValue"></td>
				</tr>
				<tr class="statTableRow">
					<td>
						<div class="rank"></div>
					</td>
					<td><div class="statTitan"></div></td>
					<td class="statValue"></td>
				</tr>
			</table>
			<!-- <div id="titanRankingCaption" class="statCaption"></div> -->
		</div>
	</div>
	<div class="page" id="titanCard">
		<h2 class="statTitle"><span class="rank"></span></h2>
		<div class="container statContainer">
			<!-- <div id="titanCardCaption" class="statCaption"></div> -->
		</div>
	</div>
	<body>
		<script src="/view.js"></script>
		<script src="/query.js"></script>
	</body>
</html>
