<!DOCTYPE html>
<html lang="en">
	<head>
		<meta charset="UTF-8" />
		<meta http-equiv="X-UA-Compatible" content="IE=edge" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<link rel="stylesheet" href="/style.css" />
		<!-- <link rel="preconnect" href="https://fonts.googleapis.com" />
		<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
		<link
			href="https://fonts.googleapis.com/css2?family=Paytone+One&display=swap"
			rel="stylesheet"
		/> -->
		<title>Bobby's Triple Threat - Stats</title>
	</head>
	<div class="section">
		<div id="appTitle" class="sectionContent">
			<h1>Titan Tracker</h1>
		</div>
		<div id="appDescription" class="sectionContent">
			Stats for <em>Bobby's Triple Threat</em> on Food Network
		</div>
	</div>
	<div class="section" id="winLoss">
		<h2 class="sectionTitle">Win-Loss Record</h2>
		<div class="sectionContent">
			<div id="winLossWidget">
				<div>
					<p class="winLossWidgetTitle">Wins</p>
					<p class="winLossWidgetValue" id="numWin"></p>
				</div>
				<div>
					<p class="winLossWidgetTitle">Losses</p>
					<p class="winLossWidgetValue" id="numLoss"></p>
				</div>
			</div>
			<div id="winLossCaption" class="statCaption"></div>
		</div>
	</div>
	<div class="section" id="titanRanking">
		<h2 class="sectionTitle">Titan Ranking</h2>
		<div class="sectionContent">
			<table class="statTable">
				<tr class="statTableHeader">
					<th>Rank</th>
					<th>Titan</th>
					<th>Win-Loss-Tie</th>
				</tr>
				<tr class="statTableRow">
					<td>
						<div class="rank"></div>
					</td>
					<td><div class="statTitan"></div></td>
					<td class="statValue"></td>
				</tr>
				<tr class="statTableRow">
					<td>
						<div class="rank"></div>
					</td>
					<td><div class="statTitan"></div></td>
					<td class="statValue"></td>
				</tr>
				<tr class="statTableRow">
					<td>
						<div class="rank"></div>
					</td>
					<td><div class="statTitan"></div></td>
					<td class="statValue"></td>
				</tr>
			</table>
			<!-- <div id="titanRankingCaption" class="statCaption"></div> -->
		</div>
	</div>
	<div class="section" id="titanCard">
		<div class="sectionTitle">
			<div class="rank rank1">1st</div>
			<div class="sectionTitle-name">
				<h2>Michael</h2>
				<h2>Voltaggio</h2>
			</div>
		</div>
		<div class="sectionContent">
			<div class="sectionRow">
				<div class="titanCard-widget titanCard-record">
					<div class="titanCard-widgetTitle">Record</div>
					<div class="titanCard-widgetContent">
						<div class="titanCard-widgetValue">9-8-2</div>
						<div class="titanCard-widgetCaption">Win-Loss-Tie</div>
					</div>
				</div>
				<div class="titanCard-widget titanCard-avgScore">
					<div class="titanCard-widgetTitle">Avg Score</div>
					<div class="titanCard-widgetContent">
						<div class="titanCard-widgetValue">7.44</div>
						<div class="titanCard-widgetCaption">10-pt scale</div>
					</div>
				</div>
			</div>
			<div
				class="titanCard-widget titanCard-widgetFull titanCard-bestScore"
			>
				<div class="titanCard-widgetTitle">Best Score</div>
				<div class="titanCard-widgetRow">
					<div class="titanCard-widgetContent">
						<div class="titanCard-widgetValue">
							20
							<!-- <span class="denominator">/20</span> -->
						</div>
						<div class="titanCard-widgetCaption">
							out of <span class="denominator">20</span>
						</div>
					</div>
					<div class="titanCard-widgetContent">
						<div
							class="titanCard-widgetValue titanCard-ingredientList"
						>
							<b>Ingredients:</b>
							<ul>
								<li>- Young Coconut</li>
								<li>- Whole Rack of Lamb</li>
							</ul>
						</div>
					</div>
				</div>
			</div>
			<!-- <div id="titanCardCaption" class="statCaption"></div> -->
		</div>
	</div>
	<body>
		<script src="/view.js"></script>
		<script src="/query.js"></script>
	</body>
</html>
